<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Shopee Order Calculator</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;width:320px;padding:16px;background-color:#f9f9f9;color:#333}h2{margin-top:0;color:#ee4d2d;font-size:18px}.btn{color:#fff;border:none;padding:10px 16px;border-radius:4px;cursor:pointer;font-weight:700;width:100%;margin-bottom:8px}#start-btn{background-color:#ee4d2d}#start-btn:hover{background-color:#d73d1f}#clear-btn{background-color:#6c757d}#clear-btn:hover{background-color:#5a6268}.btn:disabled{background-color:#ccc!important;cursor:not-allowed}#status{font-size:14px;margin-bottom:8px}#progress{font-size:12px;color:#666;margin-bottom:12px}.result-box{background:#fff;border:1px solid #eee;border-radius:4px;padding:12px;margin-top:12px;margin-bottom:12px}.result-row{display:flex;justify-content:space-between;margin-bottom:8px}.result-row:last-child{margin-bottom:0;font-weight:700;border-top:1px solid #eee;padding-top:8px}#error-msg{color:red;font-size:12px;margin-top:8px;display:none}.item-list{max-height:200px;overflow-y:auto;border:1px solid #ddd;border-radius:4px;background:#fff;margin-top:12px;display:none}.item-row{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #eee;font-size:12px}.item-row:last-child{border-bottom:none}.item-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:8px}.item-price{font-weight:700;color:#ee4d2d;white-space:nowrap}.credits{margin-top:16px;font-size:11px;text-align:center;color:#888;border-top:1px solid #eee;padding-top:8px}.credits a{color:#ee4d2d;text-decoration:none;font-weight:700}.credits a:hover{text-decoration:underline}</style></head><body><h2>Shopee Expense</h2><div id="status">Ready to calculate.</div><div id="progress"></div><button id="start-btn" class="btn">Start Calculate</button> <button id="clear-btn" class="btn" style="display:none">Clear Data</button><div id="result-container" class="result-box" style="display:none"><div class="result-row"><span>Total Orders:</span> <span id="total-count">0</span></div><div class="result-row"><span>Grand Total:</span> <span id="grand-total">0</span></div></div><div id="item-list" class="item-list"></div><div id="error-msg">Please open Shopee web to use this extension.</div><div class="credits">Created by <a href="https://github.com/novintriantonius" target="_blank">@novintriantonius</a><br>Instagram: <a href="https://www.instagram.com/sudo_notrust" target="_blank">@sudo_notrust</a></div><script src="popup.js"></script></body></html>
